name: FirebaseViewer
options:
  bundleIdPrefix: com.jamesbaker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    PRODUCT_BUNDLE_IDENTIFIER: com.jamesbaker.FirebaseViewer
    INFOPLIST_FILE: Sources/FirebaseViewer/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  FirebaseViewer:
    type: application
    platform: iOS
    sources:
      - path: Sources/FirebaseViewer
        excludes:
          - Resources/Info.plist
    resources:
      - Sources/FirebaseViewer/Resources
